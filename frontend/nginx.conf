server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for text assets
    gzip on;
    gzip_types text/html text/css application/javascript;
    gzip_min_length 256;

    # Proxy agent API calls to the agent container
    # Strips the /api/agent/ prefix before forwarding
    location /api/agent/ {
        proxy_pass http://agent:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Proxy MCP server API calls to the mcp-server container
    # Strips the /api/mcp/ prefix before forwarding
    location /api/mcp/ {
        proxy_pass http://mcp-server:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # HTML — never cache so users always get the latest build
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Static assets (CSS, JS, images, fonts) — cache for 1 year
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Serve index.html for all other requests (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
